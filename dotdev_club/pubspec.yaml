name: dotdev_club
description: "DOTDEV Club Management App - Attendance, Projects & Team Collaboration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Authentication (Keep Firebase Auth)
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  
  # Database (NEW - MongoDB Atlas)
  mongo_dart: 0.10.7
  
  # File Storage (NEW - Cloudinary)
  cloudinary_public: ^0.23.1
  
  # HTTP for API calls
  http: ^1.6.0
  
  # File & Image Handling
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Animations (Framer Motion-style)
  animated_text_kit: ^4.2.2
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
