<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥁 Virtual Air Drums - Web Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            color: white;
            text-align: center;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .container {
            position: relative;
            width: 90vw;
            max-width: 1280px;
            height: 70vh;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #videoCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .drum-zone {
            position: absolute;
            border: 3px solid;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            transition: all 0.1s ease;
            pointer-events: none;
        }

        .drum-zone.hit {
            transform: scale(1.05);
            box-shadow: 0 0 30px currentColor;
        }

        #hihat {
            top: 5%;
            left: 5%;
            width: 42%;
            height: 40%;
            background: rgba(255, 100, 100, 0.3);
            border-color: rgb(255, 100, 100);
        }

        #snare {
            top: 5%;
            right: 5%;
            width: 42%;
            height: 40%;
            background: rgba(100, 255, 100, 0.3);
            border-color: rgb(100, 255, 100);
        }

        #bass {
            bottom: 5%;
            left: 5%;
            width: 90%;
            height: 40%;
            background: rgba(100, 100, 255, 0.3);
            border-color: rgb(100, 100, 255);
        }

        .stats {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 1em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 100;
            line-height: 1.6;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2em;
            text-align: center;
            z-index: 1000;
        }

        .spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .start-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🥁 Virtual Air Drums</h1>
        <p>Move your hands over the colored zones and make quick downward motions!</p>
    </div>

    <div class="container">
        <button id="startButton" class="start-button">
            🎵 Start Drumming!
        </button>
        
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading camera and hand detection...</p>
        </div>

        <canvas id="videoCanvas"></canvas>
        
        <div class="drum-zone" id="hihat">🔴 HI-HAT</div>
        <div class="drum-zone" id="snare">🟢 SNARE</div>
        <div class="drum-zone" id="bass">🔵 BASS DRUM</div>

        <div class="stats">
            <div>FPS: <span id="fps">0</span></div>
            <div>Hits: <span id="hitCount">0</span></div>
        </div>

        <div class="instructions">
            💡 Quick downward motions trigger drums<br>
            🎵 Faster movement = Louder sound<br>
            ✋ Use both hands for complex beats
        </div>
    </div>

    <script>
        // Audio context for drum sounds
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Generate drum sounds
        function createDrumSound(frequency, duration, type = 'hihat') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            
            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'hihat') {
                oscillator.type = 'square';
                oscillator.frequency.value = frequency;
                filter.type = 'highpass';
                filter.frequency.value = 7000;
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            } else if (type === 'snare') {
                oscillator.type = 'triangle';
                oscillator.frequency.value = frequency;
                filter.type = 'bandpass';
                filter.frequency.value = 1000;
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            } else if (type === 'bass') {
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                filter.type = 'lowpass';
                filter.frequency.value = 200;
                gainNode.gain.setValueAtTime(0.8, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            }
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playDrum(type, volume = 0.5) {
            if (type === 'hihat') {
                createDrumSound(10000, 0.1, 'hihat');
            } else if (type === 'snare') {
                createDrumSound(200, 0.15, 'snare');
            } else if (type === 'bass') {
                createDrumSound(60, 0.3, 'bass');
            }
        }

        // Main application
        const videoCanvas = document.getElementById('videoCanvas');
        const canvasCtx = videoCanvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const loading = document.getElementById('loading');
        const fpsDisplay = document.getElementById('fps');
        const hitCountDisplay = document.getElementById('hitCount');

        let camera = null;
        let hands = null;
        let hitCount = 0;
        let lastFrameTime = Date.now();
        let fps = 0;

        // Hand tracking data
        const handTrackers = {
            left: { positions: [], lastHitTime: 0, cooldown: 300 },
            right: { positions: [], lastHitTime: 0, cooldown: 300 }
        };

        function calculateVelocity(positions) {
            if (positions.length < 2) return 0;
            
            const recent = positions.slice(-2);
            const dx = recent[1].x - recent[0].x;
            const dy = recent[1].y - recent[0].y;
            const dt = (recent[1].time - recent[0].time) / 1000;
            
            if (dt === 0) return 0;
            
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance / dt;
        }

        function isDownwardMotion(positions) {
            if (positions.length < 2) return false;
            const recent = positions.slice(-2);
            return (recent[1].y - recent[0].y) > 0.01;
        }

        function checkDrumHit(x, y, velocity, handedness) {
            const now = Date.now();
            const tracker = handTrackers[handedness];
            
            if (now - tracker.lastHitTime < tracker.cooldown) return;
            if (velocity < 0.5) return; // Velocity threshold
            
            const canvas = videoCanvas;
            const zones = {
                hihat: { x: 0.05, y: 0.05, w: 0.42, h: 0.40, element: document.getElementById('hihat'), sound: 'hihat' },
                snare: { x: 0.53, y: 0.05, w: 0.42, h: 0.40, element: document.getElementById('snare'), sound: 'snare' },
                bass: { x: 0.05, y: 0.55, w: 0.90, h: 0.40, element: document.getElementById('bass'), sound: 'bass' }
            };

            for (const [name, zone] of Object.entries(zones)) {
                if (x >= zone.x && x <= (zone.x + zone.w) &&
                    y >= zone.y && y <= (zone.y + zone.h)) {
                    
                    // Hit detected!
                    const volume = Math.min(velocity / 2, 1.0);
                    playDrum(zone.sound, volume);
                    
                    // Visual feedback
                    zone.element.classList.add('hit');
                    setTimeout(() => zone.element.classList.remove('hit'), 200);
                    
                    tracker.lastHitTime = now;
                    hitCount++;
                    hitCountDisplay.textContent = hitCount;
                    
                    break;
                }
            }
        }

        function onResults(results) {
            // Calculate FPS
            const now = Date.now();
            fps = Math.round(1000 / (now - lastFrameTime));
            lastFrameTime = now;
            fpsDisplay.textContent = fps;

            // Set canvas size
            videoCanvas.width = results.image.width;
            videoCanvas.height = results.image.height;

            // Draw video
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
            canvasCtx.drawImage(results.image, 0, 0, videoCanvas.width, videoCanvas.height);

            // Draw hands
            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label.toLowerCase();
                    
                    // Draw hand skeleton
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                        color: '#00FF00',
                        lineWidth: 2
                    });
                    drawLandmarks(canvasCtx, landmarks, {
                        color: handedness === 'right' ? '#FFFF00' : '#FF00FF',
                        lineWidth: 1,
                        radius: 3
                    });

                    // Track index finger (landmark 8)
                    const indexTip = landmarks[8];
                    const tracker = handTrackers[handedness];
                    
                    tracker.positions.push({
                        x: indexTip.x,
                        y: indexTip.y,
                        time: now
                    });
                    
                    if (tracker.positions.length > 5) {
                        tracker.positions.shift();
                    }

                    // Draw finger indicator
                    const color = handedness === 'right' ? '#FFFF00' : '#FF00FF';
                    canvasCtx.beginPath();
                    canvasCtx.arc(
                        indexTip.x * videoCanvas.width,
                        indexTip.y * videoCanvas.height,
                        15, 0, 2 * Math.PI
                    );
                    canvasCtx.fillStyle = color;
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = '#FFFFFF';
                    canvasCtx.lineWidth = 2;
                    canvasCtx.stroke();

                    // Check for drum hit
                    if (isDownwardMotion(tracker.positions)) {
                        const velocity = calculateVelocity(tracker.positions);
                        checkDrumHit(indexTip.x, indexTip.y, velocity, handedness);
                    }
                }
            }

            canvasCtx.restore();
        }

        async function startDrums() {
            startButton.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                // Initialize MediaPipe Hands
                hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });

                hands.onResults(onResults);

                // Initialize camera
                camera = new Camera(videoCanvas, {
                    onFrame: async () => {
                        await hands.send({ image: videoCanvas });
                    },
                    width: 1280,
                    height: 720
                });

                await camera.start();
                loading.classList.add('hidden');

            } catch (error) {
                loading.innerHTML = `
                    <p style="color: #ff6b6b;">❌ Error: ${error.message}</p>
                    <p>Please allow camera access and refresh the page.</p>
                `;
            }
        }

        startButton.addEventListener('click', startDrums);

        // Helper functions from MediaPipe
        function drawConnectors(ctx, landmarks, connections, style) {
            ctx.strokeStyle = style.color;
            ctx.lineWidth = style.lineWidth;
            
            for (const connection of connections) {
                const from = landmarks[connection[0]];
                const to = landmarks[connection[1]];
                
                ctx.beginPath();
                ctx.moveTo(from.x * videoCanvas.width, from.y * videoCanvas.height);
                ctx.lineTo(to.x * videoCanvas.width, to.y * videoCanvas.height);
                ctx.stroke();
            }
        }

        function drawLandmarks(ctx, landmarks, style) {
            for (const landmark of landmarks) {
                ctx.beginPath();
                ctx.arc(
                    landmark.x * videoCanvas.width,
                    landmark.y * videoCanvas.height,
                    style.radius, 0, 2 * Math.PI
                );
                ctx.fillStyle = style.color;
                ctx.fill();
            }
        }

        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],
            [0, 5], [5, 6], [6, 7], [7, 8],
            [0, 9], [9, 10], [10, 11], [11, 12],
            [0, 13], [13, 14], [14, 15], [15, 16],
            [0, 17], [17, 18], [18, 19], [19, 20],
            [5, 9], [9, 13], [13, 17]
        ];
    </script>
</body>
</html>
