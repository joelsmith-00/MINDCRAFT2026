<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A1F3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1B4E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shipGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00F5FF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0080FF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Stars -->
  <circle cx="100" cy="80" r="3" fill="white" opacity="0.8"/>
  <circle cx="420" cy="120" r="2" fill="white" opacity="0.6"/>
  <circle cx="150" cy="200" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="380" cy="180" r="2" fill="white" opacity="0.8"/>
  <circle cx="80" cy="350" r="2" fill="white" opacity="0.6"/>
  <circle cx="450" cy="380" r="3" fill="white" opacity="0.7"/>
  <circle cx="200" cy="450" r="2" fill="white" opacity="0.8"/>
  <circle cx="350" cy="90" r="2.5" fill="white" opacity="0.6"/>
  
  <!-- Glow effect behind ship -->
  <ellipse cx="256" cy="280" rx="120" ry="120" fill="url(#glowGradient)"/>
  
  <!-- Spaceship (triangular) -->
  <path d="M 256 120 L 160 380 L 256 340 L 352 380 Z" fill="url(#shipGradient)" stroke="#00F5FF" stroke-width="4"/>
  
  <!-- Ship details -->
  <path d="M 256 120 L 256 340" stroke="#003366" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="200" r="15" fill="#00F5FF" opacity="0.8"/>
  <circle cx="230" cy="280" r="10" fill="#0080FF" opacity="0.6"/>
  <circle cx="282" cy="280" r="10" fill="#0080FF" opacity="0.6"/>
  
  <!-- Engine glow -->
  <ellipse cx="210" cy="380" rx="15" ry="25" fill="#FF6600" opacity="0.7"/>
  <ellipse cx="302" cy="380" rx="15" ry="25" fill="#FF6600" opacity="0.7"/>
  <ellipse cx="210" cy="385" rx="12" ry="20" fill="#FFAA00" opacity="0.8"/>
  <ellipse cx="302" cy="385" rx="12" ry="20" fill="#FFAA00" opacity="0.8"/>
  
  <!-- Bullets -->
  <rect x="250" y="60" width="12" height="40" rx="6" fill="#00F5FF" opacity="0.9"/>
  <rect x="250" y="60" width="12" height="40" rx="6" fill="url(#glowGradient)" opacity="0.5"/>
</svg>
